<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joonker</title>
  <meta name="description" content="Todos os links oficiais da Joonker em um só lugar." />
  <link rel="icon" href="/favicon.ico" id="page-favicon" />
  <link rel="stylesheet" href="/links/links.css" />
</head>

<body>
  <div class="page">
    <main class="card">
      <div class="card-head">
        <img id="logo" class="logo" src="" alt="" hidden />
        <h1 id="system-name">Joonker</h1>
      </div>

      <div class="card-scroll">
        <div id="links-list" class="links-list" aria-live="polite"></div>

        <p id="empty-state" class="empty-state" hidden>Nenhum link disponível no momento.</p>
      </div>
    </main>
  </div>

  <script src="/runtime-config.js"></script>
  <script src="/links/links.js"></script>
</body>

</html>
