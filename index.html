  <body class="notranslate" translate="no">
    <script>
      (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}}catch(e){}})();
    </script>
    <div id="root" class="notranslate" translate="no">
      <div id="initial-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100vh;background:#0f172a;color:#cbd5e1;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:24px;">
        <div style="width:36px;height:36px;border-radius:50%;border:3px solid #334155;border-top-color:#e11d48;animation:crm-spin 0.8s linear infinite;"></div>
        <p style="margin:0;font-size:14px;">Carregando…</p>
        <div id="slow-loading-msg" style="display:none;max-width:320px;">
          <p style="margin:0 0 12px;font-size:13px;color:#94a3b8;">
            Isso está demorando mais que o normal. Pode ser a internet — você pode esperar um pouco mais ou recarregar.
          </p>
          <button id="retry-load-btn" type="button" style="background:#e11d48;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;">
            Recarregar
          </button>
        </div>
      </div>
    </div>
    <style>
      @keyframes crm-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Internet lenta pode deixar o carregamento inicial (HTML/JS/SW)
      // pendente por muito tempo sem nunca disparar um erro de verdade — o
      // listener de 'error' abaixo não cobre esse caso. Depois de um tempo,
      // mostra uma mensagem com opção de recarregar em vez de deixar a tela
      // de carregamento girando pra sempre sem explicação.
      setTimeout(function () {
        if (!document.getElementById('initial-loading')) return; // React já montou
        var msg = document.getElementById('slow-loading-msg');
        if (msg) msg.style.display = 'block';
      }, 8000);
      document.addEventListener('click', function (e) {
        if (!e.target || e.target.id !== 'retry-load-btn') return;
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).catch(function () {});
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister().catch(function () {}); });
          }).catch(function () {});
        }
        window.location.reload();
      });
    </script>
    <script>
      window.addEventListener('error', function (e) {
        if (!e || !e.message) return;
        var isDomError = /removeChild|insertBefore|not a child/i.test(e.message);
        var isNetworkError = /ChunkLoadError|dynamically imported module|Loading chunk|Failed to fetch/i.test(e.message);
        if (!isDomError && !(isNetworkError && navigator.onLine)) return;
        try {
          if (sessionStorage.getItem('crm_auto_recover_v6')) return;
          sessionStorage.setItem('crm_auto_recover_v6', '1');
        } catch (err) { return; }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).catch(function () {});
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister().catch(function () {}); });
          }).catch(function () {});
        }
        window.location.replace(window.location.origin + '/login?recover=' + Date.now());
      });
    </script>
