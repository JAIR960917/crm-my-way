  <body class="notranslate" translate="no">
    <script>
      (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}}catch(e){}})();
    </script>
    <div id="root" class="notranslate" translate="no"></div>
    <script>
      window.addEventListener('error', function (e) {
        if (!e || !e.message) return;
        var isDomError = /removeChild|insertBefore|not a child/i.test(e.message);
        var isNetworkError = /ChunkLoadError|dynamically imported module|Loading chunk|Failed to fetch/i.test(e.message);
        if (!isDomError && !(isNetworkError && navigator.onLine)) return;
        try {
          if (sessionStorage.getItem('crm_auto_recover_v6')) return;
          sessionStorage.setItem('crm_auto_recover_v6', '1');
        } catch (err) { return; }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }).catch(function () {});
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister().catch(function () {}); });
          }).catch(function () {});
        }
        window.location.replace(window.location.origin + '/login?recover=' + Date.now());
      });
    </script>
